site_name: DCS Modding Handbook
site_description: Community handbook for building 3D models, animations, and textures for Digital Combat Simulator using Blender and the EDM exporter.
site_author: thebgpikester
site_url: https://thebgpikester.github.io/dcs-blender-modding-handbook/

repo_url: https://github.com/thebgpikester/dcs-blender-modding-handbook
repo_name: thebgpikester/dcs-blender-modding-handbook
edit_uri: edit/main/docs/

# Copyright shown in footer
copyright: |
  &copy; 2026 DCS Modding Handbook contributors. Licensed under MIT.<br>
  Independent community project. Not affiliated with Eagle Dynamics.

theme:
  name: material
  language: en

  # Colour palette - slate dark with amber accent
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    # Navigation
    - navigation.tabs                # Top-level sections as tabs
    - navigation.tabs.sticky         # Tabs stay on screen when scrolling
    - navigation.sections            # Group items in sidebar
    - navigation.expand              # Expand sub-sections by default
    - navigation.indexes             # Section index pages
    - navigation.top                 # Back-to-top button
    - navigation.tracking            # URL updates with scroll position
    - navigation.footer              # Previous / next links

    # Search
    - search.suggest                 # Autocomplete suggestions
    - search.highlight               # Highlight matched terms on page
    - search.share                   # Shareable search URLs

    # Content
    - content.code.copy              # Copy button on code blocks
    - content.code.annotate          # Numbered annotations on code
    - content.tabs.link              # Linked content tabs
    - content.action.edit            # "Edit this page" link
    - content.action.view            # "View source" link
    - content.tooltips               # Tooltips on abbreviations

    # TOC
    - toc.follow                     # TOC follows reader's scroll position

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

  # Logo placeholder - swap for a custom one when you have it
  # logo: images/logo.png
  # favicon: images/favicon.ico

# Site navigation - mirrors the file structure
nav:
  - Home: index.md
  - Guide:
    - Overview: 00-overview.md
    - Installation: 01-installation.md
    - Geometry & Animation: 02-geometry-animation.md
    - Materials & Textures: 03-materials-textures.md
    - Lighting & Damage: 04-lighting-damage.md
    - FBX Pipeline: 05-fbx-pipeline.md
    - Substance Painter: 06-substance-painter.md
    - Troubleshooting: 07-troubleshooting.md
  - Reference:
    - Hotkeys: reference/hotkey-reference.md
    - Naming Conventions: reference/naming-conventions.md
    - Object Types: reference/object-types.md
    - EDM Material Inputs: reference/edm-material-inputs.md
  - Contributing: contributing.md

plugins:
  - search:
      lang: en
  - glightbox:                       # Click-to-zoom on images
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
  - git-revision-date-localized:     # "Last updated" on each page
      enable_creation_date: false
      type: date
      fallback_to_build_date: true
  - tags                             # Tag-based cross-cutting categorisation

markdown_extensions:
  # Python Markdown
  - abbr                             # Abbreviation tooltips
  - admonition                       # !!! note "..." boxes
  - pymdownx.blocks.admonition
  - pymdownx.blocks.html
  - attr_list                        # Add attributes to elements
  - def_list                         # Definition lists
  - footnotes
  - md_in_html                       # Markdown inside raw HTML
  - tables
  - toc:
      permalink: true                # Anchor link icon on each heading
      title: On this page

  # Python Markdown Extensions
  - pymdownx.arithmatex:             # Math support (in case future need)
      generic: true
  - pymdownx.betterem:               # Better emphasis handling
      smart_enable: all
  - pymdownx.caret                   # Insertion ^^like this^^
  - pymdownx.details                 # Collapsible details blocks
  - pymdownx.emoji:                  # Emoji shortcodes :smile:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:              # Code highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite            # Inline `code` highlighting
  - pymdownx.keys                    # ++ctrl+s++ keyboard shortcut renderer
  - pymdownx.mark                    # ==Highlighted text==
  - pymdownx.smartsymbols            # Auto-replace symbols (->, --, etc.)
  - pymdownx.snippets                # Include external file snippets
  - pymdownx.superfences:            # Code blocks with diagrams
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:                 # Tabbed content
      alternate_style: true
  - pymdownx.tasklist:               # - [ ] Task lists
      custom_checkbox: true
  - pymdownx.tilde                   # ~~Strikethrough~~

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thebgpikester/dcs-blender-modding-handbook
      name: GitHub repository
  generator: false                   # Hide "Made with MkDocs Material" footer
